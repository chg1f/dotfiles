# encoding=utf-8

set -g escape-time 10
set -g focus-events on

# mouse
set -g mouse on

# shell
# set -g default-command "$SHELL"
# set -g default-terminal "tmux-256color"
# set -as terminal-overrides ",xterm-256color:RGB"

# clipboard
set -g set-clipboard on

# history
set -g history-file "$XDG_CACHE_HOME/tmux/history"
set -g history-limit 65535

# bind
# unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mode-keys vi
set -g status-keys vi

# unbind -a -T root
bind -n M-z source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "tmux reloaded"
bind -n M-o choose-tree -Z
bind -n M-q kill-window
bind -n M-w kill-pane
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-f resize-pane -Z
bind -n M-[ copy-mode -e
bind -n M-/ copy-mode \; send-keys -X search-backward

# unbind -a -T layout
bind -n M-\; switch-client -T layout
bind -T layout Escape switch-client -T root
bind -T layout q switch-client -T root
bind -T layout M-q kill-window \; switch-client -T layout
bind -T layout M-w kill-pane \; switch-client -T layout
bind -T layout M-t new-window -c "#{pane_current_path}" \; switch-client -T layout
bind -T layout M-v split-window -h -c "#{pane_current_path}" \; switch-client -T layout
bind -T layout M-s split-window -v -c "#{pane_current_path}" \; switch-client -T layout
bind -T layout M-f resize-pane -Z \; switch-client -T layout
bind -T layout M-n next-window \; switch-client -T layout
bind -T layout M-p previous-window \; switch-client -T layout
bind -T layout M-h select-pane -L \; switch-client -T layout
bind -T layout M-j select-pane -D \; switch-client -T layout
bind -T layout M-k select-pane -U \; switch-client -T layout
bind -T layout M-l select-pane -R \; switch-client -T layout
bind -T layout h resize-pane -L 5 \; switch-client -T layout
bind -T layout j resize-pane -D 5 \; switch-client -T layout
bind -T layout k resize-pane -U 5 \; switch-client -T layout
bind -T layout l resize-pane -R 5 \; switch-client -T layout
bind -T layout H if -F "#{pane_at_left}" "" "swap-pane -t '{left-of}' \; select-pane -t !" \; switch-client -T layout
bind -T layout J if -F "#{pane_at_bottom}" "" "swap-pane -t '{down-of}' \; select-pane -t !" \; switch-client -T layout
bind -T layout K if -F "#{pane_at_top}" "" "swap-pane -t '{up-of}' \; select-pane -t !" \; switch-client -T layout
bind -T layout L if -F "#{pane_at_right}" "" "swap-pane -t '{right-of}' \; select-pane -t !" \; switch-client -T layout
bind -T layout N swap-window -t +1 \; next-window \; switch-client -T layout
bind -T layout P swap-window -t -1 \; previous-window \; switch-client -T layout
bind -T layout \? break-pane \; switch-client -T layout
bind -T layout \> move-pane -t +1 \; next-window \; switch-client -T layout
bind -T layout \< move-pane -t -1 \; previous-window \; switch-client -T layout
bind -T layout Space next-layout \; switch-client -T layout
bind -T layout s select-layout main-vertical \; switch-client -T layout
bind -T layout v select-layout main-horizontal \; switch-client -T layout
bind -T layout S select-layout even-vertical \; switch-client -T layout
bind -T layout V select-layout even-horizontal \; switch-client -T layout
bind -T layout T select-layout tiled \; switch-client -T layout
bind -T layout r command-prompt -I "" "rename-window '%%'" \; switch-client -T layout
bind -T layout R rename-window "" \; setw automatic-rename on \; switch-client -T layout

# window
set -g renumber-windows on
set -g base-index 1

# pane
set -g pane-base-index 1
set -g pane-border-style fg=gray
set -g pane-active-border-style fg=yellow

# status
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-style bg=black
set -g status-justify left

set -g status-left-length 40
set -g status-left "#{client_key_table} "
set -g status-right-length 80
set -g status-right "#{session_id}:#{window_id}:#{pane_id} #{server_sessions}s/#{session_windows}w/#{window_panes}p"

setw -g window-status-separator " | "
setw -g window-status-style fg=gray
setw -g window-status-current-style fg=yellow,bold

setw -g automatic-rename on
setw -g allow-rename on
setw -g automatic-rename-format "#{pane_current_command}:#{s|$HOME|~|;s|^(~?/[^/]+/).*(/[^/]+/[^/]+)$|\\1...\\2|:pane_current_path}"


setw -g window-status-format "#I#{?window_flags,#{window_flags},} #{window_name}"
setw -g window-status-current-format "#I#{?window_flags,#{window_flags},} #{window_name}"

# vim:ft=tmux
