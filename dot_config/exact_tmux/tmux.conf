# encoding=utf-8

set -g escape-time 10
set -g focus-events on

# mouse
set -g mouse on

# shell
# set -g default-command "$SHELL"
# set -g default-terminal "tmux-256color"
# set -as terminal-overrides ",xterm-256color:RGB"

# clipboard
set -g set-clipboard on

# history
set -g history-file "$XDG_CACHE_HOME/tmux/history"
set -g history-limit 65535

# bind
unbind C-b
# set -g prefix M-a
# bind M-a send-prefix
set -g prefix C-a
bind C-a send-prefix
# unbind -a -T prefix
# unbind -a -T root

set -g mode-keys vi
set -g status-keys vi

bind -n M-z source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "tmux reloaded"

bind -n M-o choose-tree -Z

bind -n M-q kill-window
bind -n M-w kill-pane
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-\; switch-client -T layout
bind -T layout q switch-client -T root
bind -T layout M-h select-pane -L \; switch-client -T layout
bind -T layout M-j select-pane -D \; switch-client -T layout
bind -T layout M-k select-pane -U \; switch-client -T layout
bind -T layout M-l select-pane -R \; switch-client -T layout
bind -T layout M-n next-window \; switch-client -T layout
bind -T layout M-p previous-window ; switch-client -T layout
bind -T layout M-1 select-window -t 1 \; switch-client -T layout
bind -T layout M-2 select-window -t 2 \; switch-client -T layout
bind -T layout M-3 select-window -t 3 \; switch-client -T layout
bind -T layout M-4 select-window -t 4 \; switch-client -T layout
bind -T layout M-5 select-window -t 5 \; switch-client -T layout
bind -T layout M-6 select-window -t 6 \; switch-client -T layout
bind -T layout M-7 select-window -t 7 \; switch-client -T layout
bind -T layout M-8 select-window -t 8 \; switch-client -T layout
bind -T layout M-9 select-window -t 9 \; switch-client -T layout

bind -T layout M-b break-pane \; switch-client -T layout
bind -T layout M-g join-pane \; switch-client -T layout
bind -T layout M-b move-pane \; switch-client -T layout

bind -T layout m select-pane -m \; switch-client -T layout
bind -T layout h if -F "#{pane_at_left}" "" "swap-pane -t '{left-of}' \; select-pane -t !" \; switch-client -T layout
bind -T layout j if -F "#{pane_at_bottom}" "" "swap-pane -t '{down-of}' \; select-pane -t !" \; switch-client -T layout
bind -T layout k if -F "#{pane_at_top}" "" "swap-pane -t '{up-of}' \; select-pane -t !" \; switch-client -T layout
bind -T layout l if -F "#{pane_at_right}" "" "swap-pane -t '{right-of}' \; select-pane -t !" \; switch-client -T layout

bind -T layout H resize-pane -L 5 \; switch-client -T layout
bind -T layout J resize-pane -D 5 \; switch-client -T layout
bind -T layout K resize-pane -U 5 \; switch-client -T layout
bind -T layout L resize-pane -R 5 \; switch-client -T layout

bind -T layout n swap-window -t +1 \; switch-client -T layout
bind -T layout p swap-window -t -1 \; switch-client -T layout
bind -T layout M-, command-prompt -I "#{window_name}" "rename-window '%%'" \; switch-client -T layout
# bind -T layout M-R set-window-option automatic-rename on \; rename-window ""

# window
set -g renumber-windows on
set -g base-index 1

# pane
set -g pane-base-index 1
set -g pane-border-style fg=gray
set -g pane-active-border-style fg=yellow

# status
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-style bg=black
set -g status-justify left

set -g status-left-length 40
set -g status-left "#{client_key_table} "
set -g status-right-length 80
set -g status-right "#{session_id}:#{window_id}:#{pane_id} #{server_sessions}s/#{session_windows}w/#{window_panes}p"

setw -g window-status-separator " | "
setw -g window-status-style fg=gray
setw -g window-status-current-style fg=yellow,bold

setw -g automatic-rename on
setw -g allow-rename off
setw -g automatic-rename-format "#{s|$HOME|~|;s|(~?/?.).*/.*(/.*/.*)|\\1...\\2|:pane_current_path}:#{pane_current_command}"

setw -g window-status-format "#I#{?window_flags,#{window_flags},} #{=/24/...:window_name}"
setw -g window-status-current-format "#I#{?window_flags,#{window_flags},} #{=/32/...:window_name}"

# vim:ft=tmux
