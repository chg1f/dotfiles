# encoding=utf-8

set -g escape-time 10
set -g focus-events on

# mouse
set -g mouse on

# shell
# set -g default-command "$SHELL"
# set -g default-terminal "tmux-256color"
# set -as terminal-overrides ",xterm-256color:RGB"

# clipboard
set -g set-clipboard on

# history
set -g history-file "$XDG_CACHE_HOME/tmux/history"
set -g history-limit 65535

# bind
set -g prefix C-a
unbind C-b
bind C-a send-prefix
# unbind -a -T prefix
# unbind -a -T root

set -g mode-keys vi
set -g status-keys vi

bind -n M-z source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "tmux reloaded"

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
# bind -n M-H swap-pane -L
bind -n M-J swap-pane -D
bind -n M-K swap-pane -U
# bind -n M-L swap-pane -R
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-w kill-pane
#
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-N swap-window -t +1
bind -n M-P swap-window -t -1
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-q kill-window
bind -n M-r command-prompt -I "#{window_name}" "rename-window '%%'"

bind -n M-: choose-tree -Zw

bind -n M-f resize-pane -Z
bind -n M-= resize-pane -Z
bind -n M-+ resize-pane -Z
bind -n M-- resize-pane -D 5
bind -n M-_ resize-pane -D 5

# window
set -g renumber-windows on
set -g base-index 1

# pane
set -g pane-base-index 1
set -g pane-border-style fg=gray
set -g pane-active-border-style fg=yellow

# status
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-style bg=black
set -g status-justify left

set -g status-left-length 40
set -g status-left "#S "
set -g status-right-length 80
set -g status-right "#{session_windows}w/#{session_attached}a %H:%M"

setw -g window-status-separator " | "
setw -g window-status-style fg=gray
setw -g window-status-current-style fg=yellow,bold

setw -g window-status-format "#{window_index}#{?window_flags,#{window_flags},} #{pane_current_command}:#{s|$HOME|~|;s|(~?/?.).*/.*(/.*/.*)|\\1...\\2|:pane_current_path}"
setw -g window-status-current-format "#{window_index}#{?window_flags,#{window_flags},} #{pane_current_command}:#{s|$HOME|~|;s|(~?/?.).*/.*(/.*/.*)|\\1...\\2|:pane_current_path}"

# vim:ft=tmux
